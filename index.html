<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ORÁCULO — geometría / señal</title>
<meta name="description" content="Un oráculo visual generativo: tu intención se convierte en un mandala único de geometría sagrada, con estética post-punk y sonido ambiental generativo.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%23e8e8e6' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='6' fill='none' stroke='%23e8e8e6' stroke-width='2'/%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="lienzo" aria-label="Mandala generativo del oráculo" role="img"></canvas>

<header class="marca">
  <h1>ORÁCULO</h1>
  <p class="sub">geometría&nbsp;/&nbsp;señal</p>
</header>

<div class="controles-sup">
  <button id="btn-sonido" type="button" aria-pressed="false" title="Activar sonido ambiental">SONIDO&nbsp;·&nbsp;OFF</button>
  <button id="btn-guardar" type="button" title="Descargar el mandala como imagen">GUARDAR</button>
</div>

<footer class="consola">
  <p id="respuesta" class="respuesta" aria-live="polite"></p>
  <form id="forma" autocomplete="off">
    <input id="intencion" type="text" maxlength="64" spellcheck="false"
           placeholder="escribe una intención…" aria-label="Escribe una intención">
    <button type="submit">CONSULTAR</button>
  </form>
  <p class="pista">o haz clic en el vacío para una consulta ciega</p>
</footer>

<script src="app.js"></script>
</body>
</html>
